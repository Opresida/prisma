# Netlify — Prisma (site estático, sem build)
[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "20"

# Segurança
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'"

# Cache longo para assets versionados
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML sempre revalidado
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Rota /ciencia → documento de fundamentação científica
[[redirects]]
  from = "/ciencia"
  to = "/ciencia.html"
  status = 200

# SPA leve: garante que a raiz responda (após checar arquivos reais)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
