<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  .card{width:1200px;height:630px;position:relative;padding:58px 84px;
    background:radial-gradient(120% 140% at 100% 0%, #eef4f1 0%, #e2ece8 45%, #d8e6e0 100%);
    font-family:"Segoe UI",system-ui,Arial,sans-serif;color:#20292a;display:flex;flex-direction:column}
  .spectrum{position:absolute;left:0;top:0;height:12px;width:100%;
    background:linear-gradient(90deg,#6f8fb0,#4f9a93,#6aa17f,#b9a15c,#c08a6f,#9b7fae)}
  .brand{display:flex;align-items:center;gap:18px}
  .mark{width:56px;height:56px;border-radius:15px;
    background:linear-gradient(135deg,#6f8fb0,#4f9a93,#6aa17f,#b9a15c,#c08a6f,#9b7fae);
    box-shadow:0 10px 30px rgba(30,60,55,.18)}
  .brand .nm{font-family:Georgia,serif;font-size:42px;font-weight:600;letter-spacing:.01em}
  .eyebrow{margin-top:34px;font-size:20px;letter-spacing:.16em;text-transform:uppercase;color:#3a7d74;font-weight:800}
  h1{font-family:Georgia,serif;font-size:54px;line-height:1.1;font-weight:600;letter-spacing:-.01em;
    margin:12px 0 0;max-width:21ch}
  .sub{font-size:25px;color:#4a5a56;margin-top:18px;max-width:33ch;line-height:1.45}
  .foot{display:flex;align-items:center;gap:16px;margin-top:30px;font-size:22px;color:#55635f}
  .foot b{color:#20292a;font-weight:700}
  .dot{width:6px;height:6px;border-radius:50%;background:#9bb0aa}
  .prism{position:absolute;right:64px;top:150px;width:340px;height:340px;opacity:.9}
</style>
</head>
<body>
  <div class="card">
    <div class="spectrum"></div>
    <svg class="prism" viewBox="0 0 200 200" fill="none" aria-hidden="true">
      <path d="M100 34 L156 140 H44 Z" stroke="#3a7d74" stroke-width="3.5" stroke-linejoin="round" opacity=".55"/>
      <line x1="16" y1="118" x2="78" y2="104" stroke="#c9c2b4" stroke-width="4" stroke-linecap="round"/>
      <line x1="122" y1="112" x2="190" y2="88"  stroke="#6f8fb0" stroke-width="4" stroke-linecap="round"/>
      <line x1="122" y1="120" x2="190" y2="112" stroke="#4f9a93" stroke-width="4" stroke-linecap="round"/>
      <line x1="122" y1="128" x2="190" y2="136" stroke="#6aa17f" stroke-width="4" stroke-linecap="round"/>
      <line x1="122" y1="136" x2="190" y2="160" stroke="#b9a15c" stroke-width="4" stroke-linecap="round"/>
      <line x1="122" y1="144" x2="188" y2="184" stroke="#c08a6f" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div class="brand"><span class="mark"></span><span class="nm">Prisma</span></div>
    <p class="eyebrow">Orientação, não diagnóstico</p>
    <h1>Entenda possíveis sinais de autismo, sem pressa nem julgamento.</h1>
    <p class="sub">Perguntas com base científica, uma tela de cada vez — e o caminho para uma avaliação de verdade.</p>
    <div class="foot"><b>IDASAM</b><span class="dot"></span><span>em parceria com a <b>MAZARI CORP.</b></span></div>
  </div>
</body>
</html>
